<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI & Programming Resources</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h1>Learning Resources</h1>
        <p>150+ Free AI, ML & Claude Code Resources</p>
    </div>

    <div class="search-wrap">
        <input type="text" class="search-box" id="searchBox" placeholder="Search resources..." />
    </div>

    <nav class="topic-list" id="topicList">
        <!-- Generated by app.js from data.js -->
    </nav>

    <div class="sidebar-footer">
        <span style="font-size: 12px; color: #9ca3af;">Curated Learning Hub</span>
    </div>
</aside>

<!-- ── Content ── -->
<main class="content" id="content">
    <div class="content-header" id="contentHeader">
        <h2>All Topics</h2>
        <p>Browse 150+ curated free resources for AI, ML, Claude Code & Programming</p>
    </div>
    <div class="resource-grid" id="resourceGrid"></div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
